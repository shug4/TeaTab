<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeaTab</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <!-- スタイルシート -->
  <link rel="stylesheet" href="sanitize.css">
  <link rel="stylesheet" href="style.css">
  <!-- ファビコン -->
  <link rel="shortcut icon" href="assets/bg-logos32.png" type="image/x-icon">
  <link rel="icon" href="assets/favicon.ico">
  <script src="index.js" defer></script>
</head>

<body>

  <!-- 背景レイヤー（グラデーション or 画像 + オーバーレイ） -->
  <div id="bg-layer"></div>

  <!-- アプリ本体 -->
  <div id="app">

    <!-- ヘッダー -->
    <header id="header">
      <!-- タブ一覧（JSで動的生成） -->
      <div id="tabs-container"></div>
      <!-- タブ追加ボタン（設定モード時のみ表示） -->
      <button id="add-tab-btn" title="タブ追加">＋</button>
      <!-- ヘッダー右側：検索・時計・ボタン類 -->
      <div id="header-right">
        <div id="search-wrap">
          <input type="text" id="search-input" placeholder="タブを検索...">
        </div>
        <div id="clock"></div>
        </button>
        <!-- 管理パネル開閉ボタン（表示設定ボタン同様，設定モード時のみ表示） -->
        <button class="header-icon-btn" id="supervisor-panel-btn" title="管理パネル">M</button>
        <!-- 表示設定パネル開閉ボタン（設定モード時のみ表示） -->
        <button class="header-icon-btn" id="panel-btn" title="表示設定">
          <img src="assets/menu-icon.svg" width="20" height="20" alt="表示設定">
          <!-- 設定モード　ON/Off　ボタン -->
          <button class="header-icon-btn" id="settings-btn" title="設定">
            <img src="assets/setting-ffffff.svg" width="20" height="20" alt="設定">
          </button>
      </div>
    </header>

    <!-- グリッド表示エリア（タブをスライドで切り替え） -->
    <div id="grid-outer">
      <!-- 各タブのグリッドページを横並びで配置（JSで動的生成） -->
      <div id="grid-track"></div>
    </div>
  </div>

  <!-- ================================================================
         設定パネル（panel-btnで開閉、設定モード時のみ利用可）
         ================================================================ -->
  <div id="settings-panel">
    <div class="settings-title">Settings</div>

    <!-- グリッドサイズ設定 -->
    <div class="settings-row">
      <label>列数 (Cols)</label>
      <input type="number" id="s-cols" min="2" max="12" value="6">
    </div>
    <div class="settings-row">
      <label>行数 (Rows)</label>
      <input type="number" id="s-rows" min="1" max="10" value="4">
    </div>

    <div class="settings-divider"></div>

    <!-- 背景グラデーション選択 -->
    <div class="settings-section-label">グラデーション</div>
    <div id="gradient-swatches"></div>

    <!-- グラデーションセクションの区切り（背景画像設定時はグラデーションUIごと非表示） -->
    <div class="settings-divider" id="gradient-divider"></div>

    <!-- 背景画像アップロード・位置調整 -->
    <button class="settings-btn" id="bg-btn"> 背景画像を変更</button>
    <div class="settings-row" id="bg-position-row">
      <!-- 背景画像選択時のみ表示 -->
      <label class="bg-pos-label">水平位置</label>
      <input type="range" id="bg-pos-x" min="0" max="100" value="50">
      <label class="bg-pos-label">垂直位置</label>
      <input type="range" id="bg-pos-y" min="0" max="100" value="50">
    </div>
    <!-- 非表示。bg-btnクリックでトリガー -->
    <input type="file" id="bg-upload" accept="image/*" class="hidden">

    <!-- オーバーレイ透明度 -->
    <div class="settings-row" id="overlay-row">
      <label class="bg-pos-label">オーバーレイ暗さ（0〜1）</label>
      <input type="range" id="bg-overlay" min="0" max="1" step="0.01" value="0.18">
    </div>
    <button class="settings-btn danger" id="bg-clear-btn">✕ 背景をクリア</button>

    <div class="settings-divider"></div>

    <!-- 文字色・ヘッダー色切り替え -->
    <div class="settings-row">
      <label>文字色</label>
      <div class="settings-btn-group">
        <button id="text-white-btn" class="settings-btn settings-btn-sm">白</button>
        <button id="text-black-btn" class="settings-btn settings-btn-sm">黒</button>
      </div>
    </div>
    <div class="settings-row">
      <label>ヘッダー色</label>
      <div class="settings-btn-group">
        <button id="header-white-btn" class="settings-btn settings-btn-sm">白</button>
        <button id="header-black-btn" class="settings-btn settings-btn-sm">黒</button>
      </div>
    </div>

    <div class="settings-divider"></div>

    <!-- ファビコンおよび文字サイズ変更スライダー -->
    <div class="settings-row" id="div-favicon-size">
      <label>ファビコンサイズ</label>
      <input type="range" id="sv-favicon-size" min="24" max="72" value="40">
    </div>
    <div class="settings-row" id="div-font-size">
      <label>文字サイズ</label>
      <input type="range" id="sv-font-size" min="0" max="20" step="0.1" value="11">
    </div>

    <div class="settings-divider"></div>

    <!-- データのエクスポート・インポート（インポートボタンは置換／前後追加を選ぶメニューを開く） -->
    <button class="settings-btn" id="export-btn">⬆ JSON エクスポート</button>
    <button class="settings-btn" id="import-btn-trigger">⬇ JSON インポート</button>
    <!-- import-file=置換インポート用，sv-import-file=前後追加インポート用の隠しファイル入力 -->
    <input type="file" id="import-file" accept=".json" class="hidden">
    <input type="file" id="sv-import-file" accept=".json" class="hidden">
  </div>

  <!-- ================================================================
       ブックマーク追加・編集モーダル
       ================================================================ -->
  <div id="modal-overlay">
    <div id="modal">
      <h3 id="modal-title">ブックマークを追加</h3>
      <div class="modal-field">
        <label>URL</label>
        <input type="url" id="modal-url" placeholder="https://example.com">
      </div>
      <!-- favicon自動取得プレビュー（JSで動的更新） -->
      <div class="modal-favicon-preview" id="modal-favicon-preview"></div>
      <!-- favicon手動アップロード -->
      <div class="modal-field" id="favicon-upload-field">
        <label>ファビコン画像（手動）</label>
        <input type="file" id="modal-favicon-upload" accept="image/*">
      </div>
      <!-- 最近使用したfavicon履歴 -->
      <div id="modal-recent-favicons"></div>
      <!-- 表示名 -->
      <div class="modal-field">
        <label>表示名</label>
        <input type="text" id="modal-name" placeholder="サイト名">
      </div>
      <div class="modal-btns">
        <button class="modal-btn cancel" id="modal-cancel">キャンセル</button>
        <button class="modal-btn primary" id="modal-ok">保存</button>
      </div>
    </div>
  </div>

  <!-- ================================================================
         削除確認ダイアログ（タブ削除時に表示）
         ================================================================ -->
  <div id="confirm-overlay">
    <div id="confirm-delete">
      <h3 id="confirm-deletemsg">タブを削除しますか？</h3>
      <p id="confirm-msg"></p>
      <div id="confirm-deletebtn">
        <button class="modal-btn cancel" id="confirm-cancel">キャンセル</button>
        <button class="modal-btn primary" id="confirm-ok">削除</button>
      </div>
    </div>
  </div>

  <!-- ================================================================
         タイマー設定モーダル（ブックマークカードの⏱ボタンから開く）
         ================================================================ -->
  <div id="timer-overlay">
    <div id="timer-div">
      <h3 id="timer-h3">
        ⏱ タイマー設定
        <!-- タイマー設定済みの場合のみ表示 -->
        <span id="timer-set-badge">設定済</span>
      </h3>

      <!-- 曜日・時・分の指定 -->
      <div class="modal-field">
        <label>曜日</label>
        <select id="timer-day">
          <option value="0" class="day-of-week">日曜日</option>
          <option value="1" class="day-of-week">月曜日</option>
          <option value="2" class="day-of-week">火曜日</option>
          <option value="3" class="day-of-week">水曜日</option>
          <option value="4" class="day-of-week">木曜日</option>
          <option value="5" class="day-of-week">金曜日</option>
          <option value="6" class="day-of-week">土曜日</option>
        </select>
      </div>

      <div class="modal-field timer-time-row">
        <div class="timer-time-col">
          <label class="modal-field label">時</label>
          <div class="custom-spinner">
            <button type="button" class="spinner-up" data-target="timer-hour">▲</button>
            <span id="timer-hour-display">9</span>
            <input type="hidden" id="timer-hour" value="9">
            <button type="button" class="spinner-down" data-target="timer-hour">▼</button>
          </div>
        </div>
        <div class="timer-time-col">
          <label class="modal-field label">分</label>
          <div class="custom-spinner">
            <button type="button" class="spinner-up" data-target="timer-minute">▲</button>
            <span id="timer-minute-display">0</span>
            <input type="hidden" id="timer-minute" value="0">
            <button type="button" class="spinner-down" data-target="timer-minute">▼</button>
          </div>
        </div>
      </div>

      <div id="timer-btns">
        <button class="modal-btn cancel" id="timer-cancel">キャンセル</button>
        <button class="modal-btn cancel" id="timer-clear">削除</button>
        <button class="modal-btn primary" id="timer-ok">保存</button>
      </div>
      <p id="timer-notice">
        ⚠ タイマー機能を利用するには、ブラウザでこのサイトのポップアップとリダイレクトの許可が必要です。
      </p>
    </div>
  </div>

  <!-- マネジメントモード，旧スーパーバイザーパネル -->
  <div id="supervisor-panel">
    <div id="timer-management-btn" class="settings-title">Management</div>
    <!-- localStorage 使用量 -->
    <div class="settings-section-label">localStorage使用量</div>
    <div id="sv-storage-info">
      <div id="sv-storage-bar-wrap">
        <div id="sv-storage-bar"></div>
      </div>
      <div id="sv-storage-text"></div>
    </div>
    <div class="settings-divider"></div>
    <!-- 統計 -->
    <div class="settings-section-label">統計</div>
    <div id="sv-stats"></div>
    <div class="settings-divider"></div>
    <!-- 設定パネル等の色変更 -->
    <div class="modal-field">
      <label>設定パネルの色</label>
      <input type="color" id="sv-panel-color">
    </div>
    <div class="modal-field">
      <label>設定パネルの透明度</label>
      <input type="range" id="sv-panel-opacity" min="0" max="1" step="0.01" value="0.75">
    </div>
    <div class="modal-field">
      <label>ブックマークモーダルの色</label>
      <input type="color" id="sv-modal-color">
    </div>
    <div class="modal-field">
      <label>ブックマークモーダルの透明度</label>
      <input type="range" id="sv-modal-opacity" min="0" max="1" step="0.01" value="1">
    </div>
    <div class="modal-field">
      <label>タイマーモーダルの色</label>
      <input type="color" id="sv-timer-color">
    </div>
    <div class="modal-field">
      <label>タイマーモーダルの透明度</label>
      <input type="range" id="sv-timer-opacity" min="0" max="1" step="0.01" value="1">
    </div>
    <div class="settings-divider"></div>
    <!-- タイマー機能の許可IP入力欄 -->
    <div class="settings-section-label">タイマー許可IPアドレス</div>
    <div class="modal-field">
      <input type="text" id="timer-allowed-ip" placeholder="例： 200.*.*.* , 100.100.1.1">
    </div>
    <button class="settings-btn" id="timer-ip-save-btn">保存</button>
    <div class="settings-divider"></div>
    <!-- 表示切替（検索ボックス，時計） -->
    <div class="settings-section-label">表示切り替え</div>
    <div class="settings-row">
      <label>検索ボックス</label>
      <button class="settings-btn settings-btn-sm" id="sv-toggle-search">表示</button>
    </div>
    <div class="settings-row">
      <label>時計</label>
      <button class="settings-btn settings-btn-sm" id="sv-toggle-clock">表示</button>
    </div>
    <div class="settings-divider"></div>
    <!-- すべてをリセットするのだ -->
    <button class="settings-btn danger" id="supervisor-reset-btn">すべてリセット</button>
  </div>
  <!-- CSSの設定の兼ね合いで，supervisor-panelはsettings-panelの前にもっていかないよう注意 -->

  <!-- 右クリックコンテキストメニュー（JSで動的生成） -->
  <div id="context-menu"></div>

  <!-- 通知メッセージ表示用 -->
  <div id="toast"></div>
</body>

</html>
