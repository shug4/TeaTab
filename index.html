<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookmarkHome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="sanitize.css">
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="assets/bg-logos32.png" type="image/x-icon">
</head>

<body>

  <div id="bg-layer"></div>

  <div id="app">
    <header id="header">
      <div id="tabs-container"></div>
      <button id="add-tab-btn" title="タブ追加">＋</button>
      <div id="header-right">
        <div id="clock"></div>
        <button class="header-icon-btn" id="panel-btn" title="表示設定">
          <img src="assets/menu-icon.svg" width="20" height="20" alt="表示設定">
        </button>
        <button class="header-icon-btn" id="settings-btn" title="設定">
          <img src="assets/setting-ffffff.svg" width="20" height="20" alt="設定">
        </button>
      </div>
    </header>

    <!-- <div id="grid-wrap">
      <div id="bookmark-grid"></div>
    </div> -->
    <div id="grid-outer">
      <div id="grid-track"></div>
    </div>
  </div>

  <!-- Settings Panel -->
  <div id="settings-panel">
    <div class="settings-title">Settings</div>

    <div class="settings-row">
      <label>列数 (Cols)</label>
      <input type="number" id="s-cols" min="2" max="12" value="6">
    </div>
    <div class="settings-row">
      <label>行数 (Rows)</label>
      <input type="number" id="s-rows" min="1" max="10" value="4">
    </div>

    <div class="settings-divider"></div>

    <!-- <button class="settings-btn" id="bg-btn">背景画像を変更</button> -->
    <button class="settings-btn" id="bg-btn"> 背景画像を変更</button>
    <div class="settings-row" id="bg-position-row"
      style="display:none; flex-direction:column; align-items:stretch; gap:6px;">
      <label style="color:var(--text-dim); font-size:12.5px;">水平位置</label>
      <input type="range" id="bg-pos-x" min="0" max="100" value="50"
        style="width:100%; accent-color:rgba(255,255,255,0.7);">
      <label style="color:var(--text-dim); font-size:12.5px;">垂直位置</label>
      <input type="range" id="bg-pos-y" min="0" max="100" value="50"
        style="width:100%; accent-color:rgba(255,255,255,0.7);">
    </div>
    <input type="file" id="bg-upload" accept="image/*">
    <div class="settings-row" style="flex-direction:column; align-items:stretch; gap:6px;">
      <label style="color:var(--text-dim); font-size:12.5px;">オーバーレイ暗さ（0〜1）</label>
      <input type="range" id="bg-overlay" min="0" max="1" step="0.01" value="0.18"
        style="width:100%; accent-color:rgba(255,255,255,0.7);">
    </div>
    <button class="settings-btn danger" id="bg-clear-btn">✕ 背景をクリア</button>

    <div class="settings-row">
      <label>文字色</label>
      <div style="display:flex; gap:6px;">
        <button id="text-white-btn" class="settings-btn" style="margin:0; padding:6px 12px; font-size:12px;">白</button>
        <button id="text-black-btn" class="settings-btn" style="margin:0; padding:6px 12px; font-size:12px;">黒</button>
      </div>
    </div>

    <div class="settings-divider"></div>

    <button class="settings-btn" id="export-btn">⬇ JSON エクスポート</button>
    <button class="settings-btn" id="import-btn-trigger">⬆ JSON インポート</button>
    <input type="file" id="import-file" accept=".json" style="display:none">
  </div>

  <!-- Modal -->
  <div id="modal-overlay">
    <div id="modal">
      <h3 id="modal-title">ブックマークを追加</h3>
      <div class="modal-field">
        <label>URL</label>
        <input type="url" id="modal-url" placeholder="https://example.com">
      </div>

      <div class="modal-favicon-preview" id="modal-favicon-preview"></div>
      <div class="modal-field" id="favicon-upload-field" style="display:none">
        <label>ファビコン画像（手動）</label>
        <input type="file" id="modal-favicon-upload" accept="image/*" style="background:transparent; border:1px dashed rgba(255,255,255,0.3);
                   padding:8px; border-radius:10px; color:var(--text); width:100%; cursor:pointer;">
      </div>
      <div class="modal-field">
        <label>表示名</label>


        <input type="text" id="modal-name" placeholder="サイト名">
      </div>
      <div class="modal-btns">
        <button class="modal-btn cancel" id="modal-cancel">キャンセル</button>
        <button class="modal-btn primary" id="modal-ok">保存</button>
      </div>
    </div>
  </div>

  <div id="confirm-overlay">
    <div id="confirm-delete">
      <h3 id="confirm-deletemsg">タブを削除しますか？</h3>
      <p id="confirm-msg"></p>
      <div id="confirm-deletebtn">
        <button class="modal-btn cancel" id="confirm-cancel">キャンセル</button>
        <button class="modal-btn primary" id="confirm-ok">削除</button>
      </div>
    </div>
  </div>

  <!-- Timer Modal -->
  <div id="timer-overlay" style="
    display:none; position:fixed; inset:0; z-index:200;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
    align-items:center; justify-content:center;">
    <div style="
      width:320px;
      background:rgba(155,127,239,0.998);
      border:1px solid var(--glass-border);
      border-radius:18px; padding:26px 24px;
      box-shadow:0 24px 80px rgba(0,0,0,0.5);
      color:var(--text); animation:modalIn 0.22s ease;">
      <h3
        style="font-size:15px; font-weight:500; margin-bottom:18px; display:flex; align-items:center; justify-content:space-between;">
        ⏱ タイマー設定
        <span id="timer-set-badge" style="
          display:none;
          font-size:11px;
          font-weight:500;
          padding:3px 10px;
          border-radius:20px;
          background:rgba(100,220,160,0.3);
          border:1px solid rgba(100,220,160,0.6);
          color:rgba(255, 255, 255, 0.95);
          letter-spacing:0.5px;
        ">設定済</span>
      </h3>

      <div class="modal-field">
        <label>曜日</label>
        <select id="timer-day" style="width:100%; padding:10px 12px;
          background:rgba(155,127,239,0.998); border:1px solid var(--glass-border);
          border-radius:10px; color:var(--text); font-size:14px; outline:none;
          appearance:none; -webkit-appearance:none;">
          <option value="0" style="background:rgb(60,40,120); color:#fff;">日曜日</option>
          <option value="1" style="background:rgb(60,40,120); color:#fff;">月曜日</option>
          <option value="2" style="background:rgb(60,40,120); color:#fff;">火曜日</option>
          <option value="3" style="background:rgb(60,40,120); color:#fff;">水曜日</option>
          <option value="4" style="background:rgb(60,40,120); color:#fff;">木曜日</option>
          <option value="5" style="background:rgb(60,40,120); color:#fff;">金曜日</option>
          <option value="6" style="background:rgb(60,40,120); color:#fff;">土曜日</option>
        </select>
      </div>

      <div class="modal-field" style="display:flex; gap:12px;">
        <div style="flex:1;">
          <label class="modal-field label">時</label>
          <input type="number" id="timer-hour" min="0" max="23" value="9" style="width:100%; padding:10px 12px;
            background:rgba(255,255,255,0.08); border:1px solid var(--glass-border);
            border-radius:10px; color:var(--text); font-size:14px; outline:none;">
        </div>
        <div style="flex:1;">
          <label class="modal-field label">分</label>
          <input type="number" id="timer-minute" min="0" max="59" value="0" style="width:100%; padding:10px 12px;
            background:rgba(255,255,255,0.08); border:1px solid var(--glass-border);
            border-radius:10px; color:var(--text); font-size:14px; outline:none;">
        </div>
      </div>

      <div style="display:flex; gap:8px; margin-top:20px;">
        <button class="modal-btn cancel" id="timer-cancel">キャンセル</button>
        <button class="modal-btn cancel" id="timer-clear"
          style="border-color:rgba(255,100,100,0.5); color:rgba(255,150,150,0.9);">
          削除
        </button>
        <button class="modal-btn primary" id="timer-ok">保存</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>


</body>

<script src="index.js"></script>

</html>
